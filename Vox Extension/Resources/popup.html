<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">💬 <span>Vox</span></div>
        </div>

        <div class="controls">
            <div class="language-row">
                <label>Translate to</label>
                <select id="language">
                    <option value="Auto">🌐 Auto</option>
                    <option value="English">🇬🇧 English</option>
                    <option value="Russian">🇷🇺 Russian</option>
                    <option value="Spanish">🇪🇸 Spanish</option>
                    <option value="French">🇫🇷 French</option>
                    <option value="German">🇩🇪 German</option>
                    <option value="Chinese">🇨🇳 Chinese</option>
                    <option value="Japanese">🇯🇵 Japanese</option>
                </select>
            </div>

            <button id="translateBtn" class="btn primary">⚡ Translate Page</button>
            <button id="restoreBtn" class="btn secondary" style="display:none;">↩ Restore Original</button>
        </div>

        <div id="progress" class="progress" style="display:none;">
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            <span id="progressText" class="progress-text">Translating...</span>
        </div>

        <div id="error" class="error" style="display:none;"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
