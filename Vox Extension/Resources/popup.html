<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="panel">
        <div class="title-bar">
            <span class="title-icon">💬</span>
            <span class="title-text">Vox</span>
        </div>

        <div class="card">
            <div class="card-row">
                <span class="card-label">Translate to</span>
                <div class="language-capsule" id="languageCapsule">
                    <span id="languageLabel">🌐 Auto</span>
                    <svg class="chevron" width="8" height="5" viewBox="0 0 8 5"><path d="M1 1l3 3 3-3" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <select id="language" class="language-select-hidden">
                    <option value="Auto">🌐 Auto</option>
                    <option value="English">🇬🇧 English</option>
                    <option value="Russian">🇷🇺 Russian</option>
                    <option value="Spanish">🇪🇸 Spanish</option>
                    <option value="French">🇫🇷 French</option>
                    <option value="German">🇩🇪 German</option>
                    <option value="Chinese">🇨🇳 Chinese</option>
                    <option value="Japanese">🇯🇵 Japanese</option>
                </select>
            </div>

            <!-- Toggle switch -->
            <div class="toggle-row" id="toggleRow">
                <span class="toggle-label" id="toggleLabel">Translation off</span>
                <label class="toggle">
                    <input type="checkbox" id="toggleSwitch">
                    <span class="toggle-track"></span>
                </label>
            </div>

            <div id="progress" class="progress" style="display:none;">
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <span id="progressText" class="progress-text">Translating...</span>
            </div>
        </div>

        <div id="error" class="error" style="display:none;"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
